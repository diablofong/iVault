name: Release

on:
  push:
    branches:
      - v1.0.0              # 推送到此分支時自動觸發建置（測試用）
    tags:
      - 'v*'
  workflow_dispatch:        # 手動觸發

jobs:
  # ── Windows ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Setup GCC (MSYS2 UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc
          update: false
          path-type: inherit

      - name: Build
        run: wails build -platform windows/amd64
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: '-static -lpthread'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: build/bin/iVault.exe
          retention-days: 7

  # ── macOS ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform darwin/universal

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: build/bin/iVault.app
          retention-days: 7

  # ── GitHub Release（僅在 tag push 時執行）───────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Package
        run: |
          zip iVault-windows-amd64.zip iVault.exe
          zip -r iVault-macos-universal.zip iVault.app

      - name: Generate SHA256
        run: sha256sum iVault-windows-amd64.zip iVault-macos-universal.zip > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            iVault-windows-amd64.zip
            iVault-macos-universal.zip
            SHA256SUMS.txt
