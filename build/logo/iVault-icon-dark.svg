<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="iVault">
  <title>iVault</title>
  <desc>A private, local photo vault for iPhone. Two strokes converge to a sealed dot — the act of backing up photos into a safe point.</desc>

  <defs>
    <radialGradient id="iv-bg" cx="50%" cy="36%" r="85%">
      <stop offset="0%"  stop-color="#272727"/>
      <stop offset="55%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="229" ry="229" fill="url(#iv-bg)"/>

  <rect x="3" y="3" width="1018" height="1018" rx="228" ry="228"
        fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>

  <g fill="none" stroke="#ffffff" stroke-width="60"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 288 288 L 512 650 L 736 288"/>
  </g>

  <circle cx="512" cy="776" r="48" fill="#ffffff"/>
</svg>
